# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: ICH E6(R3) suomeksi
  pageTitleSuffix: " | ICH GCP"
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: fi-FI
  baseUrl: mvattulainen.github.io/ichgcpe6r3fin
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Schibsted Grotesk
      body: Source Sans Pro
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#fbfcfd"
        lightgray: "#e4e9ee"
        gray: "#9aa7b3"
        darkgray: "#425466"
        dark: "#17212b"
        secondary: "#075985"
        tertiary: "#0f766e"
        highlight: "rgba(14, 116, 144, 0.12)"
        textHighlight: "#fef08a88"
      darkMode:
        light: "#111827"
        lightgray: "#263241"
        gray: "#64748b"
        darkgray: "#cbd5e1"
        dark: "#f8fafc"
        secondary: "#38bdf8"
        tertiary: "#5eead4"
        highlight: "rgba(56, 189, 248, 0.14)"
        textHighlight: "#a1620788"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority: [frontmatter, git, filesystem]
    order: 10
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout: { position: right, priority: 30 }
  - source: github:quartz-community/crawl-links
    enabled: true
    options: { markdownLinkResolution: shortest }
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options: { enableSiteMap: true, enableRSS: false }
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: ./plugins/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout: { position: left, priority: 50 }
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions: { grow: true }
  - source: github:quartz-community/backlinks
    enabled: true
    layout: { position: right, priority: 50 }
  - source: github:quartz-community/article-title
    enabled: true
    layout: { position: beforeBody, priority: 10 }
  - source: github:quartz-community/content-meta
    enabled: true
    layout: { position: beforeBody, priority: 20 }
  - source: github:quartz-community/page-title
    enabled: true
    layout: { position: left, priority: 10 }
  - source: github:quartz-community/darkmode
    enabled: true
    layout: { position: left, priority: 30, group: toolbar }
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout: { position: beforeBody, priority: 5, condition: not-index }
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        Lähteet: /ichgcpe6r3fin/
        GitHub: https://github.com/mvattulainen/ichgcpe6r3fin
layout:
  groups:
    toolbar: { priority: 35, direction: row, gap: 0.5rem }
  byPageType:
    "404":
      positions: { beforeBody: [], left: [], right: [] }
    content: {}
    folder:
      positions: { right: [] }
    tag:
      positions: { right: [] }
